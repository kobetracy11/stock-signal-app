<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #ffffff;
      --text2: #888888;
      --text3: #444444;
      --green: #00c805;
      --yellow: #f5c518;
      --orange: #ff6b35;
      --red: #ff3b30;
      --purple: #7c3aed;
      --accent: #00c805;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      padding-bottom: 90px;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .app-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .app-name span { color: var(--accent); }

    .market-pill {
      background: var(--surface2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
    }

    /* SEARCH */
    .search-wrap {
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.2s;
    }

    .search-input::placeholder {
      color: var(--text3);
      text-transform: none;
      font-weight: 400;
      letter-spacing: 0;
    }

    .search-input:focus { border-color: var(--accent); }

    .scan-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .scan-btn:active { opacity: 0.8; }

    /* TABS */
    .tabs {
      display: flex;
      padding: 0 20px;
      gap: 4px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 13px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* CONTENT AREAS */
    .tab-content { display: none; padding: 16px 16px 0; }
    .tab-content.active { display: block; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* STOCK CARD */
    .stock-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .stock-card:active { transform: scale(0.98); }
    .stock-card.pinned { border-color: var(--accent); }

    .card-glow {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 20px 20px 0 0;
    }

    /* CARD TOP ROW */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .ticker-block { display: flex; align-items: center; gap: 12px; }

    .ticker-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .ticker-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
    .ticker-price { font-size: 13px; color: var(--text2); margin-top: 2px; font-weight: 500; }

    /* SCORE RING */
    .score-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .score-ring {
      position: relative;
      width: 56px;
      height: 56px;
    }

    .score-ring svg {
      transform: rotate(-90deg);
      width: 56px;
      height: 56px;
    }

    .score-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 4; }
    .score-ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }

    .score-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .score-grade {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* SIGNAL BARS */
    .signal-bars { margin-bottom: 14px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .bar-label {
      font-size: 11px;
      color: var(--text2);
      width: 72px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .bar-track {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.7s ease;
    }

    .bar-val {
      font-size: 11px;
      color: var(--text3);
      width: 28px;
      text-align: right;
      font-weight: 600;
    }

    /* PIN BUTTON */
    .pin-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface2);
      border: none;
      border-radius: 10px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .pin-btn:active { background: var(--border); }

    /* SIGNALS DRAWER */
    .signals-drawer {
      display: none;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 2px;
    }

    .signals-drawer.open { display: block; }

    .signal-chip {
      display: inline-block;
      background: var(--surface2);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--text2);
      margin: 3px 3px 3px 0;
      line-height: 1.4;
    }

    .expand-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .expand-line { flex: 1; height: 1px; background: var(--border); }
    .expand-label { font-size: 11px; color: var(--text3); font-weight: 500; }

    /* SEARCH RESULT */
    .result-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 22px;
      border: 1px solid var(--border);
      margin-top: 4px;
    }

    .result-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .result-ticker { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .result-price { font-size: 15px; color: var(--text2); margin-top: 4px; font-weight: 500; }

    .big-ring { position: relative; width: 80px; height: 80px; }
    .big-ring svg { transform: rotate(-90deg); width: 80px; height: 80px; }
    .big-ring-bg { fill: none; stroke: var(--surface2); stroke-width: 5; }
    .big-ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

    .big-score-num {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .big-score-val { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
    .big-score-grade { font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

    .result-bars { margin-bottom: 18px; }

    .result-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .result-bar-label { font-size: 12px; color: var(--text2); width: 110px; flex-shrink: 0; font-weight: 500; }
    .result-bar-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .result-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
    .result-bar-val { font-size: 12px; color: var(--text3); width: 36px; text-align: right; font-weight: 600; }

    .result-signals { margin-bottom: 18px; }

    .result-signal {
      font-size: 13px;
      color: var(--text2);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
      font-weight: 500;
    }

    .result-signal:last-child { border-bottom: none; }

    .result-actions { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: var(--surface2); color: var(--text2); }
    .btn-pinned { background: var(--surface2); color: var(--accent); border: 1.5px solid var(--accent); }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      color: var(--text3);
      font-size: 14px;
      font-weight: 500;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.6;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 20px;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.03em; }
    .nav-item.active .nav-label { color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-name">Signal<span>.</span></div>
    <div class="market-pill">Small & Mid Cap</div>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="ticker-input" type="text" placeholder="Enter ticker symbol" maxlength="6" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="scan-btn" onclick="searchTicker()">Scan</button>
  </div>
</div>

<!-- TAB CONTENTS -->
<div id="tab-search" class="tab-content active">
  <div id="search-result">
    <div class="empty">Enter a ticker above to scan its signals.</div>
  </div>
</div>

<div id="tab-watchlist" class="tab-content">
  <div class="section-label">Ranked by composite score</div>
  <div id="watchlist-content">
    <div class="loading"><div class="spinner"></div>Loading signals...</div>
  </div>
</div>

<div id="tab-pinned" class="tab-content">
  <div class="section-label">Your pinned stocks</div>
  <div id="pinned-content">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" id="nav-search" onclick="switchTab('search')">
    <div class="nav-icon">🔍</div>
    <div class="nav-label">SCAN</div>
  </div>
  <div class="nav-item" id="nav-watchlist" onclick="switchTab('watchlist')">
    <div class="nav-icon">📊</div>
    <div class="nav-label">WATCHLIST</div>
  </div>
  <div class="nav-item" id="nav-pinned" onclick="switchTab('pinned')">
    <div class="nav-icon">📌</div>
    <div class="nav-label">PINNED</div>
  </div>
</nav>

<script>
  const CIRCUMFERENCE_SM = 2 * Math.PI * 24; // r=24 for small ring
  const CIRCUMFERENCE_LG = 2 * Math.PI * 36; // r=36 for big ring

  function scoreColor(score) {
    if (score >= 75) return '#00c805';
    if (score >= 55) return '#f5c518';
    if (score >= 35) return '#ff6b35';
    return '#666666';
  }

  function scoreGrade(score) {
    if (score >= 75) return 'Strong';
    if (score >= 55) return 'Moderate';
    if (score >= 35) return 'Weak';
    return 'No Signal';
  }

  function barColor(key) {
    return { technical: '#7c3aed', sentiment: '#ec4899', congressional: '#f5c518', insider: '#00c805', news: '#38bdf8' }[key] || '#888';
  }

  function barLabel(key) {
    return { technical: 'Technical', sentiment: 'Social', congressional: 'Congress', insider: 'Insider', news: 'News' }[key] || key;
  }

  function pct(score, max) { return Math.round((score / max) * 100); }

  function smallRing(score) {
    const color = scoreColor(score);
    const offset = CIRCUMFERENCE_SM - (score / 100) * CIRCUMFERENCE_SM;
    return `
      <div class="score-ring">
        <svg viewBox="0 0 56 56">
          <circle class="score-ring-bg" cx="28" cy="28" r="24"/>
          <circle class="score-ring-fill" cx="28" cy="28" r="24"
            stroke="${color}"
            stroke-dasharray="${CIRCUMFERENCE_SM}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="score-number" style="color:${color}">${score}</div>
      </div>
    `;
  }

  function bigRing(score) {
    const color = scoreColor(score);
    const offset = CIRCUMFERENCE_LG - (score / 100) * CIRCUMFERENCE_LG;
    return `
      <div class="big-ring">
        <svg viewBox="0 0 80 80">
          <circle class="big-ring-bg" cx="40" cy="40" r="36"/>
          <circle class="big-ring-fill" cx="40" cy="40" r="36"
            stroke="${color}"
            stroke-dasharray="${CIRCUMFERENCE_LG}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="big-score-num">
          <div class="big-score-val" style="color:${color}">${score}</div>
          <div class="big-score-grade" style="color:${color}">${scoreGrade(score)}</div>
        </div>
      </div>
    `;
  }

  function renderCard(data) {
    const color = scoreColor(data.score);
    const bd = data.breakdown || {};
    const isPinned = data.pinned;

    const bars = Object.entries(bd).map(([key, val]) => `
      <div class="bar-row">
        <span class="bar-label">${barLabel(key)}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct(val.score, val.max)}%;background:${barColor(key)}"></div>
        </div>
        <span class="bar-val">${val.score}/${val.max}</span>
      </div>
    `).join('');

    const chips = (data.signals || []).map(s => `<span class="signal-chip">${s}</span>`).join('');

    return `
      <div class="stock-card ${isPinned ? 'pinned' : ''}" onclick="toggleDrawer('${data.ticker}')">
        <div class="card-glow" style="background:${color}22"></div>
        <div class="card-top">
          <div class="ticker-block">
            <div class="ticker-icon" style="border:1.5px solid ${color}33">${data.ticker.slice(0,3)}</div>
            <div>
              <div class="ticker-name">${data.ticker}</div>
              <div class="ticker-price">${data.price ? '$' + data.price : '—'}</div>
            </div>
          </div>
          <div class="score-ring-wrap">
            ${smallRing(data.score)}
            <div class="score-grade" style="color:${color}">${scoreGrade(data.score)}</div>
          </div>
        </div>
        <div class="signal-bars">${bars}</div>
        <div class="expand-row">
          <div class="expand-line"></div>
          <div class="expand-label">tap for signals</div>
          <div class="expand-line"></div>
        </div>
        <div class="signals-drawer" id="drawer-${data.ticker}">${chips}</div>
        <button class="pin-btn" onclick="event.stopPropagation();togglePin('${data.ticker}',this)">
          ${isPinned ? '📌' : '🔖'}
        </button>
      </div>
    `;
  }

  function toggleDrawer(ticker) {
    const el = document.getElementById(`drawer-${ticker}`);
    if (el) el.classList.toggle('open');
  }

  let currentTab = 'search';

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`nav-${tab}`).classList.add('active');
    currentTab = tab;
    if (tab === 'watchlist') loadWatchlist();
    if (tab === 'pinned') loadPinned();
  }

  async function searchTicker() {
    const input = document.getElementById('ticker-input');
    const ticker = input.value.trim().toUpperCase();
    if (!ticker) return;
    switchTab('search');
    const el = document.getElementById('search-result');
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Scanning ${ticker}...</div>`;

    try {
      const resp = await fetch(`/api/score/${ticker}`);
      const data = await resp.json();
      if (data.error) { el.innerHTML = `<div class="empty">Error: ${data.error}</div>`; return; }

      const color = scoreColor(data.score);
      const bd = data.breakdown || {};

      const bars = Object.entries(bd).map(([key, val]) => `
        <div class="result-bar-row">
          <span class="result-bar-label">${barLabel(key)} <span style="color:var(--text3)">(/${val.max})</span></span>
          <div class="result-bar-track">
            <div class="result-bar-fill" style="width:${pct(val.score, val.max)}%;background:${barColor(key)}"></div>
          </div>
          <span class="result-bar-val">${val.score}</span>
        </div>
      `).join('');

      const signals = (data.signals || []).map(s =>
        `<div class="result-signal">${s}</div>`
      ).join('');

      el.innerHTML = `
        <div class="result-card">
          <div class="result-top">
            <div>
              <div class="result-ticker">${data.ticker}</div>
              <div class="result-price">${data.price ? '$' + data.price : 'Price unavailable'}</div>
            </div>
            ${bigRing(data.score)}
          </div>
          <div class="result-bars">${bars}</div>
          ${signals ? `<div class="result-signals">${signals}</div>` : ''}
          <div class="result-actions">
            <button class="btn ${data.pinned ? 'btn-pinned' : 'btn-primary'}" id="pin-btn-${data.ticker}"
              onclick="togglePin('${data.ticker}', this)">
              ${data.pinned ? '📌 Pinned' : '🔖 Pin Stock'}
            </button>
            <button class="btn btn-secondary" onclick="rescan('${data.ticker}')">↺ Rescan</button>
          </div>
        </div>
      `;
    } catch(e) {
      el.innerHTML = `<div class="empty">Scan failed. Check your connection and try again.</div>`;
    }
  }

  async function rescan(ticker) {
    document.getElementById('ticker-input').value = ticker;
    await searchTicker();
  }

  async function togglePin(ticker, btn) {
    const isPinned = btn.classList.contains('btn-pinned') || btn.textContent.includes('📌');
    const endpoint = isPinned ? '/api/unpin' : '/api/pin';
    await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ticker}) });
    if (btn.id && btn.id.startsWith('pin-btn')) {
      btn.textContent = isPinned ? '🔖 Pin Stock' : '📌 Pinned';
      btn.className = `btn ${isPinned ? 'btn-primary' : 'btn-pinned'}`;
    } else {
      btn.textContent = isPinned ? '🔖' : '📌';
    }
    if (currentTab === 'pinned') loadPinned();
  }

  async function loadWatchlist() {
    const el = document.getElementById('watchlist-content');
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Scoring stocks...</div>`;
    try {
      const resp = await fetch('/api/watchlist');
      const stocks = await resp.json();
      if (!stocks.length) { el.innerHTML = `<div class="empty">No stocks to show.</div>`; return; }
      el.innerHTML = stocks.map(renderCard).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty">Failed to load watchlist. Try again.</div>`;
    }
  }

  async function loadPinned() {
    const el = document.getElementById('pinned-content');
    el.innerHTML = `<div class="loading"><div class="spinner"></div>Loading pinned...</div>`;
    try {
      const resp = await fetch('/api/pinned');
      const stocks = await resp.json();
      if (!stocks.length) {
        el.innerHTML = `<div class="empty">No pinned stocks yet.<br><br>Search a ticker and tap 🔖 to pin it here.</div>`;
        return;
      }
      el.innerHTML = stocks.map(renderCard).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty">Failed to load. Try again.</div>`;
    }
  }

  document.getElementById('ticker-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchTicker();
  });
</script>
</body>
</html>
